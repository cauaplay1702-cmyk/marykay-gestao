<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#C0396B"/>
<title>Mary Kay — Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --pink:#C0396B;--pink-l:#E8527F;--pink-pale:#FDF0F4;--pink-border:#F0B4CC;
  --white:#fff;--bg:#FDF0F5;--text:#2D1A23;--mid:#7A4F61;--muted:#B08898;
  --r-sm:10px;--r-md:16px;--r-lg:22px;--r-xl:28px;
  --nav-h:68px;--header-h:70px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);position:relative;}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 10% 0%,rgba(232,82,127,.12) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 90% 100%,rgba(201,150,90,.10) 0%,transparent 55%),
             linear-gradient(150deg,#FDF0F5 0%,#FEF4F8 40%,#FDF8F0 100%);
}

/* === HEADER === */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:var(--header-h);
  background:linear-gradient(135deg,var(--pink) 0%,#A02855 60%,#7D1E42 100%);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  box-shadow:0 2px 16px rgba(192,57,107,.3);
  overflow:hidden;
}
.header::before{content:'';position:absolute;top:-30px;right:-20px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.06);}
.header-brand{display:flex;align-items:center;gap:10px;position:relative;z-index:1;}
.header-logo{width:40px;height:40px;background:rgba(255,255,255,.15);border-radius:50%;border:1.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:18px;}
.header-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:#fff;line-height:1.1;}
.header-sub{font-size:10px;color:rgba(255,255,255,.65);letter-spacing:.06em;text-transform:uppercase;}
.header-add{
  position:relative;z-index:1;
  background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);
  color:#fff;border-radius:var(--r-md);
  padding:8px 14px;font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:6px;cursor:pointer;
  font-family:'Inter',sans-serif;min-height:40px;
}
.header-add:active{background:rgba(255,255,255,.3);}

/* === SCROLL AREA === */
.scroll-area{
  position:fixed;
  top:var(--header-h);bottom:var(--nav-h);
  left:0;right:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  z-index:1;
}
.content{padding:16px 14px 24px;position:relative;z-index:1;}

/* === BOTTOM NAV === */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:var(--nav-h);
  background:var(--white);
  border-top:1px solid var(--pink-border);
  display:flex;
  box-shadow:0 -4px 20px rgba(192,57,107,.1);
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;border:none;background:none;cursor:pointer;
  font-size:10px;font-weight:500;color:var(--muted);
  padding:8px 4px;font-family:'Inter',sans-serif;
  transition:color .15s;
}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.nav-btn.active{color:var(--pink);}
.nav-btn.active svg{stroke-width:2.2;}

/* === SECTIONS === */
.section{display:none;}
.section.active{display:block;}

/* === SECTION TITLE === */
.sec-title{
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:600;color:var(--text);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--pink-border),transparent);}

/* === METRIC CARDS === */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.m-card{
  background:var(--white);border:1px solid var(--pink-border);
  border-radius:var(--r-lg);padding:14px 12px;text-align:center;
  box-shadow:0 2px 10px rgba(192,57,107,.07);position:relative;overflow:hidden;
}
.m-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pink),var(--pink-l));border-radius:var(--r-lg) var(--r-lg) 0 0;}
.m-icon{font-size:20px;margin-bottom:6px;}
.m-label{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.m-value{font-size:18px;font-weight:600;color:var(--pink);}
.m-sub{font-size:10px;color:var(--muted);margin-top:2px;}

/* === CARD === */
.card{background:var(--white);border:1px solid var(--pink-border);border-radius:var(--r-lg);margin-bottom:14px;box-shadow:0 2px 10px rgba(192,57,107,.06);overflow:hidden;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 0;}
.card-title{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.card-icon{width:28px;height:28px;background:var(--pink-pale);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.card-count{font-size:11px;color:var(--muted);}

/* === LIST ITEMS (mobile-friendly rows) === */
.item-list{padding:8px 0;}
.item-row{
  display:flex;align-items:center;padding:12px 14px;
  border-bottom:1px solid #FDE8F1;gap:12px;
}
.item-row:last-child{border-bottom:none;}
.item-row:active{background:#FFF7FB;}
.item-dot{width:36px;height:36px;border-radius:50%;background:var(--pink-pale);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.item-body{flex:1;min-width:0;}
.item-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.item-value{font-size:14px;font-weight:600;color:var(--pink);}
.item-del{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;color:var(--muted);line-height:1;}
.item-del:active{color:#C0392B;}

/* === BADGES === */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.b-ok{background:#E6F7EE;color:#1A7A45;}
.b-low{background:#FFF4E0;color:#9B6200;}
.b-out{background:#FDEAEA;color:#A02020;}
.b-done{background:#E6F7EE;color:#1A7A45;}
.b-pend{background:#FFF4E0;color:#9B6200;}
.b-sale{background:#EAF2FF;color:#1A55A0;}
.b-swap{background:var(--pink-pale);color:var(--pink);}

/* === ALERT === */
.alert{background:#FFF8E7;border:1px solid #FFDB8A;border-left:4px solid #F0A500;border-radius:var(--r-md);padding:11px 14px;font-size:13px;color:#7A5200;margin-bottom:10px;display:flex;align-items:flex-start;gap:8px;}

/* === ACTIONS === */
.actions{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.btn-primary{
  background:linear-gradient(135deg,var(--pink),var(--pink-l));
  color:#fff;border:none;border-radius:var(--r-md);
  padding:12px 18px;font-size:14px;font-weight:600;
  cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  box-shadow:0 3px 12px rgba(192,57,107,.3);
  font-family:'Inter',sans-serif;min-height:46px;
}
.btn-primary:active{opacity:.88;}
.search-wrap{flex:1;min-width:140px;}
.search-input{
  width:100%;padding:11px 14px;
  border:1px solid var(--pink-border);border-radius:var(--r-md);
  font-size:14px;background:var(--white);color:var(--text);
  font-family:'Inter',sans-serif;outline:none;min-height:46px;
}
.search-input:focus{border-color:var(--pink);}

/* === MODAL === */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(45,26,35,.55);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--white);width:100%;max-height:92vh;overflow-y:auto;
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding:20px 18px calc(20px + env(safe-area-inset-bottom));
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:40px;height:4px;background:var(--pink-border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.modal-icon{width:36px;height:36px;background:var(--pink-pale);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:13px;}
.form-group label{font-size:12px;color:var(--mid);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.form-group input,.form-group select{
  padding:13px 14px;border:1.5px solid var(--pink-border);border-radius:var(--r-md);
  font-size:16px;background:var(--white);color:var(--text);
  font-family:'Inter',sans-serif;outline:none;
  -webkit-appearance:none;appearance:none;
}
.form-group input:focus,.form-group select:focus{border-color:var(--pink);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-footer{display:flex;gap:10px;margin-top:18px;}
.btn-ghost{flex:1;background:none;color:var(--pink);border:1.5px solid var(--pink-border);border-radius:var(--r-md);padding:13px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-ghost:active{background:var(--pink-pale);}
.btn-confirm{flex:2;background:linear-gradient(135deg,var(--pink),var(--pink-l));color:#fff;border:none;border-radius:var(--r-md);padding:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-confirm:active{opacity:.88;}

/* === SALE SUMMARY === */
.sale-sum{background:linear-gradient(135deg,var(--pink-pale),#FEF0F7);border:1px solid var(--pink-border);border-radius:var(--r-md);padding:14px;margin-top:4px;display:none;}
.sale-sum .sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.sale-sum .sv{font-size:28px;font-weight:700;color:var(--pink);font-family:'Playfair Display',serif;}
.sale-sum .sp{font-size:13px;color:#1A7A45;font-weight:600;margin-top:2px;}

/* === TOAST === */
.toast{position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:12px 22px;border-radius:var(--r-md);font-size:14px;font-weight:500;z-index:1000;opacity:0;transition:all .3s ease;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* === EMPTY === */
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-size:14px;}

/* === FAB (botão flutuante extra) === */
.profit-pos{color:#1A7A45;font-weight:600;}
.qty-pill{display:inline-block;background:var(--pink-pale);color:var(--pink);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-brand">
    <div class="header-logo">🌸</div>
    <div>
      <div class="header-title">Mary Kay</div>
      <div class="header-sub">Gestão de Consultora</div>
    </div>
  </div>
  <button class="header-add" onclick="openModal('modal-produto')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Produto
  </button>
</div>

<!-- SCROLL AREA -->
<div class="scroll-area" id="scroll-area">
<div class="content">

  <!-- INÍCIO -->
  <div class="section active" id="sec-inicio">
    <div class="sec-title">Visão Geral</div>
    <div class="metrics" id="m-inicio"></div>

    <div class="card">
      <div class="card-head"><div class="card-title"><div class="card-icon">⚠️</div>Alertas de estoque</div></div>
      <div id="alertas" style="padding:0 14px 10px;margin-top:10px;"></div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title"><div class="card-icon">🕐</div>Últimas movimentações</div></div>
      <div class="item-list" id="ultimas"></div>
    </div>
  </div>

  <!-- ESTOQUE -->
  <div class="section" id="sec-estoque">
    <div class="sec-title">Meu Estoque</div>
    <div class="actions">
      <button class="btn-primary" onclick="openModal('modal-produto')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar
      </button>
      <div class="search-wrap"><input type="search" class="search-input" placeholder="🔍 Buscar produto..." oninput="filtrarEstoque(this.value)"/></div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title"><div class="card-icon">📦</div>Produtos</div>
        <span class="card-count" id="total-label"></span>
      </div>
      <div class="item-list" id="lista-estoque"></div>
    </div>
  </div>

  <!-- VENDAS -->
  <div class="section" id="sec-vendas">
    <div class="sec-title">Vendas</div>
    <div class="actions">
      <button class="btn-primary" onclick="openModal('modal-venda')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Registrar venda
      </button>
    </div>
    <div class="metrics" id="m-vendas"></div>
    <div class="card">
      <div class="card-head"><div class="card-title"><div class="card-icon">🧾</div>Histórico</div></div>
      <div class="item-list" id="lista-vendas"></div>
    </div>
  </div>

  <!-- TROCAS -->
  <div class="section" id="sec-trocas">
    <div class="sec-title">Trocas</div>
    <div class="actions">
      <button class="btn-primary" onclick="openModal('modal-troca')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Registrar troca
      </button>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title"><div class="card-icon">🔄</div>Trocas registradas</div></div>
      <div class="item-list" id="lista-trocas"></div>
    </div>
  </div>

</div><!-- /content -->
</div><!-- /scroll-area -->

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showSec('inicio')" id="nav-inicio">
    <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Início
  </button>
  <button class="nav-btn" onclick="showSec('estoque')" id="nav-estoque">
    <svg viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
    Estoque
  </button>
  <button class="nav-btn" onclick="showSec('vendas')" id="nav-vendas">
    <svg viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    Vendas
  </button>
  <button class="nav-btn" onclick="showSec('trocas')" id="nav-trocas">
    <svg viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
    Trocas
  </button>
</nav>

<!-- MODAL: Produto -->
<div class="modal-overlay" id="modal-produto">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title"><div class="modal-icon">📦</div>Adicionar produto</div>
    <div class="form-group">
      <label>Nome do produto</label>
      <input type="text" id="p-nome" placeholder="Ex: Base Líquida FPS 15" autocomplete="off"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Categoria</label>
        <select id="p-cat">
          <option>Maquiagem</option><option>Skincare</option><option>Perfumaria</option>
          <option>Corpo e Banho</option><option>Cuidado dos Lábios</option><option>Outros</option>
        </select>
      </div>
      <div class="form-group">
        <label>Quantidade</label>
        <input type="number" id="p-qtd" placeholder="0" min="0" inputmode="numeric"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Mínimo (alerta)</label>
        <input type="number" id="p-min" placeholder="2" min="0" inputmode="numeric"/>
      </div>
      <div class="form-group">
        <label>Custo (R$)</label>
        <input type="number" id="p-custo" placeholder="0,00" step="0.01" inputmode="decimal"/>
      </div>
    </div>
    <div class="form-group">
      <label>Preço de venda (R$)</label>
      <input type="number" id="p-venda" placeholder="0,00" step="0.01" inputmode="decimal"/>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modal-produto')">Cancelar</button>
      <button class="btn-confirm" onclick="salvarProduto()">✓ Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: Venda -->
<div class="modal-overlay" id="modal-venda">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title"><div class="modal-icon">🧾</div>Registrar venda</div>
    <div class="form-group">
      <label>Nome da cliente</label>
      <input type="text" id="v-cliente" placeholder="Ex: Ana Clara" autocomplete="off"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Produto</label>
        <select id="v-produto" onchange="aoSelecionarProduto()"></select>
      </div>
      <div class="form-group">
        <label>Quantidade</label>
        <input type="number" id="v-qtd" value="1" min="1" inputmode="numeric" oninput="calcularResumo()"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Preço unit. (R$)</label>
        <input type="number" id="v-preco" placeholder="0,00" step="0.01" inputmode="decimal" oninput="calcularResumo()"/>
      </div>
      <div class="form-group">
        <label>Pagamento</label>
        <select id="v-pagamento">
          <option>Dinheiro</option><option>Pix</option>
          <option>Crédito</option><option>Débito</option><option>Fiado</option>
        </select>
      </div>
    </div>
    <div class="sale-sum" id="sale-sum">
      <div class="sl">Total da venda</div>
      <div class="sv" id="sv-total">R$ 0,00</div>
      <div class="sp" id="sv-lucro">Lucro: R$ 0,00</div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modal-venda')">Cancelar</button>
      <button class="btn-confirm" onclick="salvarVenda()">✓ Registrar</button>
    </div>
  </div>
</div>

<!-- MODAL: Troca -->
<div class="modal-overlay" id="modal-troca">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title"><div class="modal-icon">🔄</div>Registrar troca</div>
    <div class="form-group">
      <label>Nome da vendedora</label>
      <input type="text" id="t-vendedora" placeholder="Ex: Lúcia Costa" autocomplete="off"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Produto que DEU</label>
        <select id="t-deu"></select>
      </div>
      <div class="form-group">
        <label>Produto RECEBIDO</label>
        <input type="text" id="t-recebeu" placeholder="Ex: Máscara Lash Love"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quantidade</label>
        <input type="number" id="t-qtd" value="1" min="1" inputmode="numeric"/>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="t-status"><option>Concluída</option><option>Pendente</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modal-troca')">Cancelar</button>
      <button class="btn-confirm" onclick="salvarTroca()">✓ Registrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STORAGE =====
function salvar(){
  localStorage.setItem('mk_p',JSON.stringify(produtos));
  localStorage.setItem('mk_v',JSON.stringify(vendas));
  localStorage.setItem('mk_t',JSON.stringify(trocas));
  localStorage.setItem('mk_id',String(nextId));
}
function carregar(){
  try{
    const p=localStorage.getItem('mk_p');
    const v=localStorage.getItem('mk_v');
    const t=localStorage.getItem('mk_t');
    const n=localStorage.getItem('mk_id');
    if(p) produtos=JSON.parse(p);
    if(v) vendas=JSON.parse(v);
    if(t) trocas=JSON.parse(t);
    if(n) nextId=parseInt(n);
  }catch(e){}
}

let produtos=[],vendas=[],trocas=[],nextId=1,filtro='';
carregar();

// ===== NAV =====
function showSec(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  document.getElementById('scroll-area').scrollTop=0;
  if(id==='inicio') renderInicio();
  if(id==='estoque') renderEstoque();
  if(id==='vendas') renderVendas();
  if(id==='trocas') renderTrocas();
}

// ===== MODALS =====
function openModal(id){
  if(id==='modal-venda'||id==='modal-troca') populateSelects();
  document.getElementById(id).classList.add('open');
  // fechar teclado ao tocar fora do input
  setTimeout(()=>{
    const overlay=document.getElementById(id);
    overlay.addEventListener('touchstart',function(e){
      if(e.target===overlay) closeModal(id);
    },{once:true});
  },100);
}
function closeModal(id){
  document.getElementById(id).classList.remove('open');
}

function populateSelects(){
  const opts=produtos.filter(p=>p.qtd>0).map(p=>`<option value="${p.id}">${p.nome} (${p.qtd})</option>`).join('');
  const empty='<option value="">-- Sem estoque --</option>';
  const vs=document.getElementById('v-produto');
  if(vs){vs.innerHTML=opts||empty;aoSelecionarProduto();}
  const ts=document.getElementById('t-deu');
  if(ts) ts.innerHTML=opts||empty;
}

// ===== RESUMO VENDA =====
function aoSelecionarProduto(){
  const sel=document.getElementById('v-produto');
  if(!sel||!sel.value) return;
  const p=produtos.find(x=>Number(x.id)===Number(sel.value));
  if(p) document.getElementById('v-preco').value=p.venda.toFixed(2);
  calcularResumo();
}
function calcularResumo(){
  const qtd=parseFloat(document.getElementById('v-qtd').value)||0;
  const preco=parseFloat(document.getElementById('v-preco').value)||0;
  const total=qtd*preco;
  const sum=document.getElementById('sale-sum');
  if(total>0){
    sum.style.display='block';
    document.getElementById('sv-total').textContent='R$ '+total.toFixed(2);
    const sel=document.getElementById('v-produto');
    if(sel&&sel.value){
      const p=produtos.find(x=>Number(x.id)===Number(sel.value));
      if(p) document.getElementById('sv-lucro').textContent='✨ Lucro: R$ '+((preco-p.custo)*qtd).toFixed(2);
    }
  } else { sum.style.display='none'; }
}

// ===== TOAST =====
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== SALVAR =====
function salvarProduto(){
  const nome=document.getElementById('p-nome').value.trim();
  if(!nome){alert('Informe o nome do produto.');return;}
  produtos.push({
    id:++nextId,nome,
    cat:document.getElementById('p-cat').value,
    qtd:parseInt(document.getElementById('p-qtd').value)||0,
    min:parseInt(document.getElementById('p-min').value)||2,
    custo:parseFloat(document.getElementById('p-custo').value)||0,
    venda:parseFloat(document.getElementById('p-venda').value)||0,
  });
  salvar();
  closeModal('modal-produto');
  ['p-nome','p-qtd','p-min','p-custo','p-venda'].forEach(id=>document.getElementById(id).value='');
  toast('✅ Produto adicionado!');
  renderEstoque();renderInicio();
}

function salvarVenda(){
  const cliente=document.getElementById('v-cliente').value.trim();
  const sel=document.getElementById('v-produto');
  if(!cliente||!sel.value){alert('Preencha cliente e produto.');return;}
  const p=produtos.find(x=>Number(x.id)===Number(sel.value));
  const qtd=parseInt(document.getElementById('v-qtd').value)||1;
  if(qtd>p.qtd){alert('Quantidade maior que o estoque!');return;}
  const preco=parseFloat(document.getElementById('v-preco').value)||p.venda;
  p.qtd-=qtd;
  vendas.unshift({id:++nextId,data:new Date().toLocaleDateString('pt-BR'),cliente,produto:p.nome,qtd,preco,custo:p.custo,pagamento:document.getElementById('v-pagamento').value});
  salvar();
  closeModal('modal-venda');
  document.getElementById('v-cliente').value='';
  document.getElementById('sale-sum').style.display='none';
  toast('✅ Venda registrada!');
  renderVendas();renderInicio();
}

function salvarTroca(){
  const vendedora=document.getElementById('t-vendedora').value.trim();
  const sel=document.getElementById('t-deu');
  if(!vendedora||!sel.value){alert('Preencha vendedora e produto.');return;}
  const p=produtos.find(x=>Number(x.id)===Number(sel.value));
  const qtd=parseInt(document.getElementById('t-qtd').value)||1;
  if(qtd>p.qtd){alert('Quantidade maior que o estoque!');return;}
  p.qtd-=qtd;
  trocas.unshift({id:++nextId,data:new Date().toLocaleDateString('pt-BR'),vendedora,deu:p.nome,recebeu:document.getElementById('t-recebeu').value.trim()||'—',qtd,status:document.getElementById('t-status').value});
  salvar();
  closeModal('modal-troca');
  document.getElementById('t-vendedora').value='';document.getElementById('t-recebeu').value='';
  toast('✅ Troca registrada!');
  renderTrocas();renderInicio();
}

// ===== EXCLUIR =====
function excluirProduto(id){
  produtos=produtos.filter(p=>Number(p.id)!==Number(id));
  salvar();toast('🗑️ Produto removido.');renderEstoque();renderInicio();
}
function excluirVenda(id){
  vendas=vendas.filter(v=>Number(v.id)!==Number(id));
  salvar();toast('🗑️ Venda removida.');renderVendas();renderInicio();
}
function excluirTroca(id){
  trocas=trocas.filter(t=>Number(t.id)!==Number(id));
  salvar();toast('🗑️ Troca removida.');renderTrocas();renderInicio();
}

// ===== FILTRO =====
function filtrarEstoque(v){filtro=v.toLowerCase();renderEstoque();}

// ===== STATUS =====
function statusBadge(p){
  if(p.qtd===0) return '<span class="badge b-out">Sem estoque</span>';
  if(p.qtd<=p.min) return '<span class="badge b-low">Estoque baixo</span>';
  return '<span class="badge b-ok">Em estoque</span>';
}
function catEmoji(c){
  const m={'Maquiagem':'💄','Skincare':'✨','Perfumaria':'🌺','Corpo e Banho':'🛁','Cuidado dos Lábios':'💋','Outros':'📦'};
  return m[c]||'📦';
}

// ===== RENDER INÍCIO =====
function renderInicio(){
  const ti=produtos.reduce((s,p)=>s+p.qtd,0);
  const ve=produtos.reduce((s,p)=>s+p.qtd*p.custo,0);
  const tv=vendas.reduce((s,v)=>s+v.preco*v.qtd,0);
  const lu=vendas.reduce((s,v)=>s+(v.preco-v.custo)*v.qtd,0);
  document.getElementById('m-inicio').innerHTML=`
    <div class="m-card"><div class="m-icon">📦</div><div class="m-label">Itens</div><div class="m-value">${ti}</div><div class="m-sub">${produtos.length} produtos</div></div>
    <div class="m-card"><div class="m-icon">💰</div><div class="m-label">Investido</div><div class="m-value">R$${ve.toFixed(0)}</div></div>
    <div class="m-card"><div class="m-icon">🛍️</div><div class="m-label">Vendido</div><div class="m-value">R$${tv.toFixed(0)}</div></div>
    <div class="m-card"><div class="m-icon">✨</div><div class="m-label">Lucro</div><div class="m-value">R$${lu.toFixed(0)}</div></div>
  `;
  const alertas=produtos.filter(p=>p.qtd<=p.min);
  const al=document.getElementById('alertas');
  al.innerHTML=alertas.length
    ? alertas.map(p=>`<div class="alert">⚠️ <span><strong>${p.nome}</strong> — ${p.qtd} un restante(s)</span></div>`).join('')
    : '<div style="text-align:center;padding:8px 0;color:var(--muted);font-size:13px;">🌸 Tudo certo com o estoque!</div>';
  const movs=[
    ...vendas.slice(0,3).map(v=>({tipo:'Venda',icon:'🛍️',nome:v.produto,meta:v.cliente,data:v.data,id:v.id})),
    ...trocas.slice(0,2).map(t=>({tipo:'Troca',icon:'🔄',nome:t.deu,meta:t.vendedora,data:t.data,id:t.id})),
  ].slice(0,5);
  document.getElementById('ultimas').innerHTML=movs.length
    ? movs.map(m=>`
        <div class="item-row">
          <div class="item-dot">${m.icon}</div>
          <div class="item-body">
            <div class="item-name">${m.nome}</div>
            <div class="item-meta">${m.meta} · ${m.data}</div>
          </div>
          <div class="item-right"><span class="badge ${m.tipo==='Venda'?'b-sale':'b-swap'}">${m.tipo}</span></div>
        </div>`).join('')
    : '<div class="empty"><div class="empty-icon">🕐</div><div class="empty-text">Nenhuma movimentação ainda.</div></div>';
}

// ===== RENDER ESTOQUE =====
function renderEstoque(){
  const lista=produtos.filter(p=>p.nome.toLowerCase().includes(filtro));
  document.getElementById('total-label').textContent=lista.length+' produto(s)';
  document.getElementById('lista-estoque').innerHTML=lista.length
    ? lista.map(p=>`
        <div class="item-row">
          <div class="item-dot">${catEmoji(p.cat)}</div>
          <div class="item-body">
            <div class="item-name">${p.nome}</div>
            <div class="item-meta">${p.cat} · custo R$${p.custo.toFixed(2)}</div>
            <div style="margin-top:4px;">${statusBadge(p)}</div>
          </div>
          <div class="item-right">
            <span class="item-value">R$${p.venda.toFixed(2)}</span>
            <span class="qty-pill">${p.qtd} un</span>
            <button class="item-del" onclick="excluirProduto(${p.id})">🗑️</button>
          </div>
        </div>`).join('')
    : '<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Nenhum produto cadastrado.<br>Toque em Adicionar para começar.</div></div>';
}

// ===== RENDER VENDAS =====
function renderVendas(){
  const total=vendas.reduce((s,v)=>s+v.preco*v.qtd,0);
  const lucro=vendas.reduce((s,v)=>s+(v.preco-v.custo)*v.qtd,0);
  const ticket=vendas.length?(total/vendas.length).toFixed(2):'0.00';
  document.getElementById('m-vendas').innerHTML=`
    <div class="m-card"><div class="m-icon">🛍️</div><div class="m-label">Total vendido</div><div class="m-value">R$${total.toFixed(0)}</div></div>
    <div class="m-card"><div class="m-icon">✨</div><div class="m-label">Lucro total</div><div class="m-value">R$${lucro.toFixed(0)}</div></div>
    <div class="m-card"><div class="m-icon">📋</div><div class="m-label">Vendas</div><div class="m-value">${vendas.length}</div></div>
    <div class="m-card"><div class="m-icon">🎯</div><div class="m-label">Ticket médio</div><div class="m-value">R$${ticket}</div></div>
  `;
  document.getElementById('lista-vendas').innerHTML=vendas.length
    ? vendas.map(v=>`
        <div class="item-row">
          <div class="item-dot">🛍️</div>
          <div class="item-body">
            <div class="item-name">${v.cliente}</div>
            <div class="item-meta">${v.produto} · ${v.qtd}x · ${v.pagamento}</div>
            <div class="item-meta">${v.data}</div>
          </div>
          <div class="item-right">
            <span class="item-value">R$${(v.preco*v.qtd).toFixed(2)}</span>
            <span class="profit-pos" style="font-size:12px;">+R$${((v.preco-v.custo)*v.qtd).toFixed(2)}</span>
            <button class="item-del" onclick="excluirVenda(${v.id})">🗑️</button>
          </div>
        </div>`).join('')
    : '<div class="empty"><div class="empty-icon">🧾</div><div class="empty-text">Nenhuma venda registrada ainda.</div></div>';
}

// ===== RENDER TROCAS =====
function renderTrocas(){
  document.getElementById('lista-trocas').innerHTML=trocas.length
    ? trocas.map(t=>`
        <div class="item-row">
          <div class="item-dot">🔄</div>
          <div class="item-body">
            <div class="item-name">${t.vendedora}</div>
            <div class="item-meta">Deu: ${t.deu}</div>
            <div class="item-meta">Recebeu: ${t.recebeu} · ${t.data}</div>
          </div>
          <div class="item-right">
            <span class="badge ${t.status==='Concluída'?'b-done':'b-pend'}">${t.status}</span>
            <span class="qty-pill">${t.qtd} un</span>
            <button class="item-del" onclick="excluirTroca(${t.id})">🗑️</button>
          </div>
        </div>`).join('')
    : '<div class="empty"><div class="empty-icon">🔄</div><div class="empty-text">Nenhuma troca registrada ainda.</div></div>';
}

// Init
renderInicio();
renderEstoque();
</script>
</body>
</html>
